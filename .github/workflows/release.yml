name: Release

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    # ── Read version and create tag ────────────────────────────────────────────
    version:
        # Only run if CI passed and was triggered by a push (not a PR)
        if: >
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.event == 'push'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        outputs:
            version: ${{ steps.pkg.outputs.version }}
            tag: ${{ steps.pkg.outputs.tag }}
            exists: ${{ steps.check.outputs.exists }}
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - name: Read version from package.json
              id: pkg
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Version: $VERSION"

            - name: Check if tag already exists
              id: check
              run: |
                  if git ls-remote --tags origin "refs/tags/v${{ steps.pkg.outputs.version }}" | grep -q .; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "Tag v${{ steps.pkg.outputs.version }} already exists, skipping release"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                    echo "New version v${{ steps.pkg.outputs.version }}, will create release"
                  fi

    # ── macOS universal binary (Apple Silicon + Intel) ─────────────────────────
    build-mac:
        needs: version
        if: needs.version.outputs.exists == 'false'
        runs-on: macos-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
              with:
                  node-version: 24
                  cache: npm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable as of 2026-02-13
              with:
                  toolchain: stable

            - name: Add Apple Silicon and Intel targets
              run: |
                  rustup target add aarch64-apple-darwin
                  rustup target add x86_64-apple-darwin

            - run: npm ci

            - name: Build macOS universal DMG
              run: npm run tauri:build:mac:universal

            - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: mac-dmg
                  path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    # ── Windows (.msi + .exe) ──────────────────────────────────────────────────
    build-win:
        needs: version
        if: needs.version.outputs.exists == 'false'
        runs-on: windows-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
              with:
                  node-version: 24
                  cache: npm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable as of 2026-02-13
              with:
                  toolchain: stable

            - run: npm ci

            - name: Build Windows installers
              run: npm run tauri:build:win

            - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: win-installers
                  path: |
                      src-tauri/target/release/bundle/msi/*.msi
                      src-tauri/target/release/bundle/nsis/*.exe

    # ── Linux (.AppImage + .deb) ───────────────────────────────────────────────
    build-linux:
        needs: version
        if: needs.version.outputs.exists == 'false'
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
              with:
                  node-version: 24
                  cache: npm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable as of 2026-02-13
              with:
                  toolchain: stable

            - name: Install Linux system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf

            - run: npm ci

            - name: Build Linux packages
              run: npm run tauri:build:linux

            - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: linux-packages
                  path: |
                      src-tauri/target/release/bundle/appimage/*.AppImage
                      src-tauri/target/release/bundle/deb/*.deb

    # ── Create tag + GitHub Release ────────────────────────────────────────────
    release:
        needs: [version, build-mac, build-win, build-linux]
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

            - name: Create tag
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git tag -a "${{ needs.version.outputs.tag }}" -m "Release ${{ needs.version.outputs.tag }}"
                  git push origin "${{ needs.version.outputs.tag }}"

            - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Create GitHub Release
              uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae # v2
              with:
                  tag_name: ${{ needs.version.outputs.tag }}
                  name: Petal ${{ needs.version.outputs.tag }}
                  draft: false
                  prerelease: false
                  generate_release_notes: true
                  body: |
                      ## Installation notes
                      These builds are unsigned, so your OS may show a security warning when installing.
                      - **macOS**: Right-click the app → Open, then click Open in the dialog. If macOS says the app is "damaged", run: `xattr -cr /Applications/Petal.app`
                      - **Windows**: Click "More info" → "Run anyway"
                      - **Linux**: `chmod +x` the AppImage before running
                  files: |
                      artifacts/**/*.dmg
                      artifacts/**/*.msi
                      artifacts/**/*.exe
                      artifacts/**/*.AppImage
                      artifacts/**/*.deb
